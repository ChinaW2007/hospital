<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medicine API Server</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f1f5f9; color: #111; margin: 0; padding: 24px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { margin-bottom: 16px; }
    .card { background: white; border-radius: 8px; padding: 18px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
    .card h2 { margin-top: 0; }
    .endpoint { margin: 12px 0; }
    .endpoint code { background: #eef2ff; padding: 4px 8px; border-radius: 4px; }
    img { width: 100%; max-width: 100%; display: block; border: 1px solid #ddd; border-radius: 8px; background: #000; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Medicine API Server</h1>
    <div class="card">
      <h2>API 测试</h2>
      <p>服务启动后，你可以访问：</p>
      <ul>
        <li><code>/docs</code> - Swagger UI</li>
        <li><code>/redoc</code> - ReDoc 文档</li>
      </ul>
    </div>
    <div class="card">
      <h2>摄像头</h2>
      <p>视频流代理地址：</p>
      <div class="endpoint"><code>/api/v1/camera/proxy</code></div>
      <img src="/api/v1/camera/proxy" alt="Camera Proxy Stream" />
    </div>
    <div class="card">
      <h2>说明</h2>
      <p>如果视频未显示，请先确认摄像头 RTSP 地址是否可达，并且系统已安装 ffmpeg。</p>
      <p>可在 Swagger 文档中直接测试其它接口。</p>
    </div>
  </div>
</body>
</html>
